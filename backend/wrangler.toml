# Gemocode AI relay — Cloudflare Worker configuration.
#
# This is a P1 scaffold (see docs/ROADMAP.md Part 4). It is NOT deployed and
# carries zero deployment assumptions: no account-specific resource IDs, no
# routes/zones, no secrets. See backend/README.md for the exact owner
# actions required before `wrangler deploy` will work.

name = "gemocode-relay"
main = "src/index.ts"

# Bump this to a current date (YYYY-MM-DD, no later than the day you deploy)
# before first deploy — see https://developers.cloudflare.com/workers/configuration/compatibility-dates/.
# Left at a known-valid date so this file is a working starting point, not a
# placeholder that fails to parse.
compatibility_date = "2024-09-23"

# --- Runtime configuration (non-secret) ---
# Wrangler passes unquoted TOML numbers through as JS numbers at runtime;
# `src/env.ts`'s `Env` interface types these as `number` accordingly.
[vars]
# Per-user daily token allowance for the report-summary relay (§1.3 of the
# roadmap's backend section). 60000 is a safety ceiling, not the expected
# usage rate — typical usage is ~4 report summaries/month per the cost
# model in docs/ROADMAP.md Part 4 §4.1.
PER_USER_DAILY_TOKENS = 60000

# Global daily token cap across all users — the emergency brake described in
# docs/ROADMAP.md Part 4 §4.3: when tripped, the client falls back to the
# always-available on-device rule-based review with no AI paraphrase. This
# default is a starting guess sized for "hundreds of users" scale; tune it
# once real usage/spend data exists (§5.3 observability minimums cover the
# alerting this depends on).
GLOBAL_DAILY_TOKENS = 5000000

# Models used per `/v1/ai/generate` `kind` (src/generate.ts). Each matches
# the model the corresponding BYO-key client service already uses today:
# MODEL_REPORT <- AISummaryService.swift, MODEL_CHAT <- AIChatService.swift,
# MODEL_EXTRACT <- QuickAddAIService.swift. See docs/ROADMAP.md Part 4 §1.5
# for the model-routing rationale (Opus for the single highest-stakes output
# per session; Sonnet for conversational chat; Haiku for cheap structured
# extraction).
MODEL_REPORT = "claude-opus-4-8"
MODEL_CHAT = "claude-sonnet-5"
MODEL_EXTRACT = "claude-haiku-4-5-20251001"

# Model for the vision-based bloodwork-photo extraction endpoint
# (POST /v1/extract-labs, src/extractLabs.ts). This is a harder
# perception/OCR task than MODEL_EXTRACT's free-text Quick Add parsing —
# misreading a printed lab value has real correctness stakes in a
# health-tracking app — so this defaults to Sonnet rather than Haiku despite
# the extra cost. Tune independently of MODEL_EXTRACT if usage data suggests
# otherwise.
MODEL_EXTRACT_LABS = "claude-sonnet-5"

# Premium enforcement gate for /v1/ai/generate (src/index.ts). "false" until
# App Store subscription verification (auth.ts#verifyAppTransactionPlaceholder)
# and App Attest are both implemented — see README.md's GA checklist before
# flipping this to "true" in production. A Wrangler `[vars]` string, not a
# TOML boolean — compared as `env.ENFORCE_PREMIUM === "true"` at the call site.
ENFORCE_PREMIUM = "false"

# --- KV namespace: the quota ledger (per-user + global daily token counts) ---
# Not provisioned by this scaffold — there is no Cloudflare account to
# provision it against yet. Before first deploy:
#   wrangler kv namespace create QUOTA_KV
# then uncomment the block below and paste in the `id` that command prints.
#
# [[kv_namespaces]]
# binding = "QUOTA_KV"
# id = "REPLACE_WITH_ID_FROM_WRANGLER_KV_NAMESPACE_CREATE"

# --- Secrets ---
# NEVER set secrets in this file or anywhere in code — see backend/README.md
# for the full custody/rotation runbook. Set both before first deploy:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put JWT_SECRET
