name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    # macOS runners bill at a 10x minute multiplier on private repos —
    # don't spend them on commits that can't change the build.
    paths-ignore:
      - 'site/**'
      - 'docs/**'
      - '**.md'
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the runner's default (latest) Xcode — pinning an older Xcode
      # fails because the image only ships simulator runtimes for the
      # newest SDKs. Pick whatever iPhone simulator the image provides.
      - name: Pick simulator
        id: sim
        run: |
          xcrun simctl list devices available --json > /tmp/sims.json
          DEVICE=$(python3 -c "
          import json, re
          d = json.load(open('/tmp/sims.json'))['devices']
          def ver(runtime):
              m = re.search(r'iOS-(\d+)-(\d+)', runtime)
              return (int(m.group(1)), int(m.group(2))) if m else (0, 0)
          # Deterministic: newest iOS runtime first, then alphabetical device name.
          candidates = sorted(
              ((ver(rt), dev['name']) for rt, devs in d.items() for dev in devs if dev['name'].startswith('iPhone')),
              key=lambda t: (t[0], t[1]), reverse=True)
          print(candidates[0][1])")
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: xcodebuild test -project Gemocode.xcodeproj -scheme Gemocode -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" CODE_SIGNING_ALLOWED=NO
