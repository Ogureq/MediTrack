name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use the runner's default (latest) Xcode — pinning an older Xcode
      # fails because the image only ships simulator runtimes for the
      # newest SDKs. Pick whatever iPhone simulator the image provides.
      - name: Pick simulator
        id: sim
        run: |
          xcrun simctl list devices available --json > /tmp/sims.json
          DEVICE=$(python3 -c "import json; d = json.load(open('/tmp/sims.json'))['devices']; print(next(dev['name'] for devs in d.values() for dev in devs if dev['name'].startswith('iPhone')))")
          echo "Using simulator: $DEVICE"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: xcodebuild test -project MediTrack.xcodeproj -scheme MediTrack -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" CODE_SIGNING_ALLOWED=NO
