<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gemocode — Join the iOS Beta</title>
<meta name="description" content="Your meds, vitals, and health score — one beautiful place. Be first to try Gemocode before it hits the App Store.">
<meta property="og:title" content="Gemocode — iOS Beta, now open">
<meta property="og:description" content="Be first to try Gemocode before it hits the App Store.">
<meta name="theme-color" content="#000000">
<style>
  body{margin:0;background:#050812;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#40C8E0;text-decoration:none}
  a:hover{color:#7EE8B0}
  .stage{position:relative;min-height:100vh;min-height:100svh;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
  shader-lines{position:absolute;inset:0;pointer-events:none}
  .content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px;max-width:760px}
  .badge{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:1.6px;color:rgba(255,255,255,.85);text-transform:uppercase;padding:8px 16px;border-radius:999px;background:rgba(255,255,255,.06);box-shadow:inset 0 0 0 1px rgba(255,255,255,.22);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);margin-bottom:28px;animation:fadeIn 1.2s ease both}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.8)}
  h1{margin:0 0 20px;display:flex;justify-content:center;font-size:clamp(56px,11vw,104px);font-weight:800;letter-spacing:-.03em;line-height:1}
  h1 span{display:inline-block;background:linear-gradient(180deg,#fff,rgba(255,255,255,.55));-webkit-background-clip:text;background-clip:text;color:transparent;animation:riseIn .9s cubic-bezier(.2,.8,.2,1) both}
  .sub{margin:0 0 44px;font-size:clamp(16px,2.4vw,19px);line-height:1.6;color:rgba(235,235,245,.55);max-width:440px;text-wrap:pretty;animation:fadeIn 1.4s ease .5s both}
  .cta-wrap{animation:fadeIn 1.4s ease .8s both}
  .cta{display:inline-flex;align-items:center;gap:12px;padding:20px 36px;border-radius:20px;font-size:18px;font-weight:700;color:#000;cursor:pointer;background:rgba(255,255,255,.96);box-shadow:0 12px 32px rgba(255,255,255,.18),inset 0 1px 0 rgba(255,255,255,.8);transition:transform .3s,box-shadow .3s}
  .cta:hover{transform:translateY(-3px);box-shadow:0 18px 44px rgba(255,255,255,.28),inset 0 1px 0 rgba(255,255,255,.8);color:#000}
  .cta:focus-visible{outline:3px solid rgba(255,255,255,.9);outline-offset:3px}
  .cta-sub{margin-top:22px;font-size:12.5px;color:rgba(235,235,245,.35);animation:fadeIn 1.4s ease 1.1s both}
  .home{position:absolute;top:20px;left:24px;z-index:2;font-size:13px;font-weight:600;color:rgba(235,235,245,.45)}
  .home:hover{color:#40C8E0}
  @keyframes riseIn{from{transform:translateY(90px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @media (prefers-reduced-motion: reduce){
    .badge,h1 span,.sub,.cta-wrap,.cta-sub{animation:none}
    .cta{transition:none}
  }
</style>
</head>
<body>
<div class="stage">
  <shader-lines aria-hidden="true"></shader-lines>
  <a class="home" href="index.html">&larr; gemocode.app</a>
  <div class="content">
    <div class="badge"><span class="dot"></span> iOS Beta &middot; Now Open</div>
    <h1 id="title" aria-label="Gemocode"></h1>
    <p class="sub">Your meds, vitals, and health score &mdash; one beautiful place. Be first to try Gemocode before it hits the App Store.</p>
    <div class="cta-wrap">
      <a class="cta" id="join" href="#">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000" aria-hidden="true"><path d="M17.05 12.94c-.03-2.62 2.14-3.88 2.24-3.94-1.22-1.79-3.12-2.03-3.8-2.06-1.61-.16-3.15.95-3.97.95-.82 0-2.08-.93-3.43-.9-1.76.03-3.39 1.02-4.29 2.6-1.83 3.18-.47 7.88 1.32 10.46.87 1.26 1.91 2.68 3.27 2.63 1.31-.05 1.81-.85 3.4-.85 1.58 0 2.03.85 3.42.82 1.42-.02 2.31-1.28 3.18-2.55.99-1.46 1.4-2.88 1.42-2.95-.03-.02-2.73-1.05-2.76-4.21zM14.44 5.06c.72-.87 1.2-2.08 1.07-3.29-1.03.04-2.29.69-3.03 1.56-.66.77-1.25 2-1.09 3.18 1.15.09 2.33-.58 3.05-1.45z"></path></svg>
        <span id="join-label">Join the Beta on TestFlight</span>
      </a>
    </div>
    <div class="cta-sub" id="join-sub">Free during beta &middot; Requires iOS 17+ and the TestFlight app</div>
  </div>
</div>

<script>
// Animated title: one span per letter, staggered rise-in.
(function () {
  var word = 'Gemocode';
  var h1 = document.getElementById('title');
  for (var i = 0; i < word.length; i++) {
    var s = document.createElement('span');
    s.textContent = word[i];
    s.style.animationDelay = (0.15 + i * 0.05).toFixed(2) + 's';
    h1.appendChild(s);
  }
})();

// CTA: once a public TestFlight link exists, put it here and the button
// goes straight to TestFlight. Until then it falls back to the same
// invite-request email as the main site — no fake "you're on the list".
(function () {
  var TESTFLIGHT_URL = '';
  var MAILTO = 'mailto:beta@gemocode.app?subject=Beta%20invite&body=The%20lab%20value%20I%20wish%20I%20understood%3A%20';
  var btn = document.getElementById('join');
  if (TESTFLIGHT_URL) {
    btn.href = TESTFLIGHT_URL;
    return;
  }
  btn.href = MAILTO;
  btn.addEventListener('click', function () {
    document.getElementById('join-label').textContent = 'Invite requested ✓';
    document.getElementById('join-sub').textContent =
      'Send the email that just opened — invites go out in weekly batches.';
  });
})();

// Background: WebGL beam shader (64 rainbow columns rising on black),
// from the design project's shader-lines component. Static single frame
// when the visitor prefers reduced motion; plain black if WebGL is out.
(function () {
  class ShaderLines extends HTMLElement {
    connectedCallback() {
      this.style.cssText += ';display:block;overflow:hidden;background:#000';
      const c = document.createElement('canvas');
      c.style.cssText = 'width:100%;height:100%;display:block';
      this.appendChild(c);
      const gl = c.getContext('webgl', { antialias: false, alpha: false });
      if (!gl) return;
      const vs = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
      const fs = 'precision highp float;\n' +
        'uniform float t;uniform vec2 r;\n' +
        'vec3 hue(float h){return clamp(abs(mod(h*6.+vec3(0.,4.,2.),6.)-3.)-1.,0.,1.);}\n' +
        'float rnd(float n){return fract(sin(n*12.9898)*43758.5453);}\n' +
        'void main(){\n' +
        '  vec2 uv=gl_FragCoord.xy/r;\n' +
        '  float cols=64.;\n' +
        '  float ix=floor(uv.x*cols);\n' +
        '  float fx=fract(uv.x*cols);\n' +
        '  float rn=rnd(ix);\n' +
        '  float speed=mix(.04,.28,rnd(ix+7.));\n' +
        '  float len=mix(.35,.95,rnd(ix+3.));\n' +
        '  float ph=fract(uv.y*mix(.6,1.4,rn)-t*speed-rn);\n' +
        '  float beam=pow(smoothstep(1.-len,1.,1.-ph),1.6);\n' +
        '  float blocks=floor(mix(6.,22.,rnd(ix+11.)));\n' +
        '  float step_=floor(ph*blocks)/blocks;\n' +
        '  float mosaic=mix(.55,1.,rnd(ix*3.1+floor(step_*blocks)+floor(t*mix(.5,2.,rn))));\n' +
        '  vec3 col=hue(fract(ix/cols+.12*sin(t*.15)+.5*rnd(ix+5.)));\n' +
        '  float edge=smoothstep(0.,.15,fx)*smoothstep(1.,.85,fx);\n' +
        '  col*=beam*mosaic*edge*1.15;\n' +
        '  col+=col*col*.4;\n' +
        '  gl_FragColor=vec4(col,1.);\n' +
        '}';
      const sh = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; };
      const prog = gl.createProgram();
      gl.attachShader(prog, sh(gl.VERTEX_SHADER, vs));
      gl.attachShader(prog, sh(gl.FRAGMENT_SHADER, fs));
      gl.linkProgram(prog); gl.useProgram(prog);
      const buf = gl.createBuffer();
      gl.bindBuffer(gl.ARRAY_BUFFER, buf);
      gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
      const loc = gl.getAttribLocation(prog, 'p');
      gl.enableVertexAttribArray(loc);
      gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
      const uT = gl.getUniformLocation(prog, 't'), uR = gl.getUniformLocation(prog, 'r');
      const dpr = Math.min(window.devicePixelRatio || 1, 1.5);
      const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const resize = () => {
        const w = Math.max(1, this.clientWidth * dpr) | 0, h = Math.max(1, this.clientHeight * dpr) | 0;
        if (c.width !== w || c.height !== h) { c.width = w; c.height = h; gl.viewport(0, 0, w, h); }
      };
      new ResizeObserver(resize).observe(this);
      const t0 = performance.now();
      const frame = () => {
        if (!this.isConnected) return;
        resize();
        gl.uniform1f(uT, (performance.now() - t0) / 1000);
        gl.uniform2f(uR, c.width, c.height);
        gl.drawArrays(gl.TRIANGLES, 0, 3);
        if (!reduceMotion) this._raf = requestAnimationFrame(frame);
      };
      frame();
    }
    disconnectedCallback() { cancelAnimationFrame(this._raf); }
  }
  if (!customElements.get('shader-lines')) customElements.define('shader-lines', ShaderLines);
})();
</script>
</body>
</html>
